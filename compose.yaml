# Full ShiftFlow stack: PostgreSQL + API + web console behind a Caddy reverse
# proxy. Bring it all up with:
#
#   docker compose up --build
#
# Then open http://localhost (or set SITE_ADDRESS to a domain for auto-HTTPS).
# Copy .env.example to .env to override credentials, ports and VAPID keys.
#
# The mobile app (mobile/) is a client, not a service — build it separately with
# `flutter build apk|ios|web --dart-define=API_BASE=https://<your-host>`.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shiftflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shiftflow}
      POSTGRES_DB: ${POSTGRES_DB:-shiftflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shiftflow} -d ${POSTGRES_DB:-shiftflow}"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: ./shiftflow-mvp
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      # The API sits behind Caddy here, so X-Forwarded-For is trustworthy.
      TRUST_PROXY: "1"
      DATABASE_URL: postgres://${POSTGRES_USER:-shiftflow}:${POSTGRES_PASSWORD:-shiftflow}@db:5432/${POSTGRES_DB:-shiftflow}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@shiftflow.local}
      # Email: APP_URL is used in invite/reset/verify links; without SMTP_HOST
      # emails are logged instead of sent.
      APP_URL: ${APP_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-ShiftFlow <no-reply@shiftflow.local>}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    volumes:
      - api_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No host ports: the API is reached only through the web proxy at /api.

  web:
    build:
      context: ./web-admin
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  api_data:
  caddy_data:
  caddy_config:
